; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = ai-thinker-cam
boards_dir = ./boards
src_dir = src
lib_dir = lib

[env]
build_flags = 
	-D VIEWER_WIFI_SSID='"Akwarium-2-4"'
	-D VIEWER_WIFI_PASS='"wifi2da2875277"'
	-D VIEWER_STREAM_HOST='"192.168.50.86"'
	-D VIEWER_STREAM_PORT=80
	-D VIEWER_STREAM_PATH='"/mjpeg/1"'

; Camera environments use this shared source filter
[camera_common]
build_src_filter = +<*> -<cvbs_viewer/**> -<tft_viewer/**>

[env:ai-thinker-cam]
build_type = release
platform = espressif32
framework = arduino, espidf
board = ai-thinker-cam
board_build.partitions = ai-thinker-cam.csv
upload_protocol = esptool
build_src_filter = ${camera_common.build_src_filter}
lib_deps = 
	tzapu/WiFiManager@^2.0.17
	${env.lib_deps}
	bitbank2/JPEGDEC@^1.8.4
lib_ldf_mode = deep+
upload_speed = 921600
monitor_speed = 115200
build_flags = 
	${env.build_flags}
	-D CAMERA_MODEL_AI_THINKER
	-D CAMERA_MULTICLIENT_TASK
	-I components/esp32-camera/sensors
	-I components/esp32-camera/sensors/private_include
	-I components/esp32-camera/conversions/include
	-I components/esp32-camera/conversions/private_include
	-I components/esp32-camera/driver/include
	-I components/esp32-camera/driver/private_include
	-I components/esp32-camera/target/jpeg_include
	-I components/esp32-camera/target/private_include
	-D FRAME_SIZE=FRAMESIZE_HVGA
	-D XCLK_FREQ=20000000
	-D FPS=25
	-D WSINTERVAL=100
	-D MAX_CLIENTS=10
	-D JPEG_QUALITY=10
	-D LOG_LEVEL=0
	-D DISABLE_LOGGING
	-D WM_NODEBUG

[env:ai-thinker-cam-debug]
build_type = debug
platform = espressif32
framework = arduino, espidf
board = ai-thinker-cam
board_build.partitions = ai-thinker-cam.csv
board_build.partition_table_offset = 0x8000
upload_protocol = esptool
build_src_filter = ${camera_common.build_src_filter}
lib_deps = 
	tzapu/WiFiManager@^2.0.17
	${env.lib_deps}
	bitbank2/JPEGDEC@^1.8.4
lib_ldf_mode = deep+
upload_speed = 921600
monitor_speed = 115200
build_flags = 
	${env.build_flags}
	-D CAMERA_MODEL_AI_THINKER
	-D CAMERA_MULTICLIENT_TASK
	-I components/esp32-camera/sensors
	-I components/esp32-camera/sensors/private_include
	-I components/esp32-camera/conversions/include
	-I components/esp32-camera/conversions/private_include
	-I components/esp32-camera/driver/include
	-I components/esp32-camera/driver/private_include
	-I components/esp32-camera/target/jpeg_include
	-I components/esp32-camera/target/private_include
	-D FRAME_SIZE=FRAMESIZE_HVGA
	-D XCLK_FREQ=20000000
	-D FPS=10
	-D WSINTERVAL=100
	-D MAX_CLIENTS=10
	-D JPEG_QUALITY=10
	-D LOG_LEVEL=6
	-D BENCHMARK
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1

[env:esp32s3-cam]
build_type = release
platform = espressif32
framework = arduino, espidf
board = esp32s3-n16r8
board_build.mcu = esp32s3
board_build.f_cpu = 240000000L
board_build.partitions = esp32s3-viewer.csv
board_build.partition_table_offset = 0x8000
upload_protocol = esptool
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
build_src_filter = ${camera_common.build_src_filter}
lib_deps = 
	tzapu/WiFiManager@^2.0.17
	${env.lib_deps}
	; bitbank2/JPEGDEC@^1.8.4
lib_ldf_mode = deep+
upload_speed = 921600
monitor_speed = 115200
build_flags = 
	${env.build_flags}
	-D CAMERA_MODEL_ESP32S3_SPK
	-D CAMERA_MULTICLIENT_TASK
	-I components/esp32-camera/sensors
	-I components/esp32-camera/sensors/private_include
	-I components/esp32-camera/conversions/include
	-I components/esp32-camera/conversions/private_include
	-I components/esp32-camera/driver/include
	-I components/esp32s-camera/driver/private_include
	-I components/esp32-camera/target/jpeg_include
	-I components/esp32-camera/target/private_include
	; -D FRAME_SIZE=FRAMESIZE_QVGA // FRAMESIZE_SVGA // FRAMESIZE_SXGA
	-D FRAME_SIZE=FRAMESIZE_SVGA
	-D XCLK_FREQ=20000000
	-D FPS=10
	-D WSINTERVAL=10
	-D MAX_CLIENTS=10
	-D JPEG_QUALITY=10
	; -D LOG_LEVEL=6
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D LOG_LEVEL=0
	-D DISABLE_LOGGING
	-D WM_NODEBUG

[env:esp32dev]
build_type = debug
platform = espressif32
framework = arduino, espidf
board = esp32dev
board_build.partitions = esp32-cvbs-viewer.csv
upload_protocol = esptool
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
build_src_filter = ${camera_common.build_src_filter}
lib_deps = 
	tzapu/WiFiManager@^2.0.17
	${env.lib_deps}
	lovyan03/LovyanGFX@^1.1.16
	bitbank2/JPEGDEC@^1.8.4
lib_ldf_mode = deep+
upload_speed = 115200
monitor_speed = 115200
build_flags = 
	${env.build_flags}
	-D CAMERA_MODEL_WROVER_KIT
	-D CAMERA_MULTICLIENT_TASK
	-D LOCAL_CAMERA_PREVIEW
	-D BOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue
	-I components/esp32-camera/sensors
	-I components/esp32-camera/sensors/private_include
	-I components/esp32-camera/conversions/include
	-I components/esp32-camera/conversions/private_include
	-I components/esp32-camera/driver/include
	-I components/esp32-camera/driver/private_include
	-I components/esp32-camera/target/jpeg_include
	-I components/esp32-camera/target/private_include
	-D FRAME_SIZE=FRAMESIZE_HVGA
	-D XCLK_FREQ=20000000
	-D FPS=10
	-D WSINTERVAL=10
	-D MAX_CLIENTS=10
	-D JPEG_QUALITY=10
	-D LOG_LEVEL=6

[env:esp32s3-viewer]
build_type = release
platform = espressif32
framework = arduino
board = esp32s3-n16r8
board_build.partitions = esp32s3-viewer.csv
board_build.arduino.memory_type = qio_opi
upload_protocol = esptool
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
monitor_speed = 115200
lib_deps = 
	lovyan03/LovyanGFX@^1.1.16
	bitbank2/JPEGDEC@^1.8.4
lib_ldf_mode = deep+
build_src_filter = +<tft_viewer/*.cpp>
build_flags = 
	-D BOARD_HAS_PSRAM
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D LOG_LEVEL=0
	-D DISABLE_LOGGING
	-D WM_NODEBUG

[env:esp32dev-cvbs]
; CVBS composite video output mode for ESP32-WROVER board
; Receives MJPEG stream over WiFi → decodes → outputs PAL/NTSC composite
; Use: pio run -e esp32dev-cvbs -t upload
; Wire: GPIO25 (DAC1) → RCA center pin, GND → RCA shield
build_type = debug
platform = espressif32
framework = arduino, espidf
board = esp32dev
board_build.partitions = esp32-cvbs-viewer.csv
upload_protocol = esptool
upload_port = /dev/ttyUSB0
monitor_port = /dev/ttyUSB0
lib_deps = 
	lovyan03/LovyanGFX@^1.1.16
	bitbank2/JPEGDEC@^1.8.4
lib_ldf_mode = deep+
upload_speed = 115200
monitor_speed = 115200
build_src_filter = -<*> +<cvbs_viewer/*.cpp>
build_flags = 
	${env.build_flags}
	-D BOARD_HAS_PSRAM
	-mfix-esp32-psram-cache-issue
	-D VIEWER_CVBS_PAL
	-D VIEWER_CVBS_PIN=25

[env:esp32-cvbs-viewer]
; Standalone CVBS viewer for boards WITHOUT PSRAM (e.g. bare ESP32-DevKit)
build_type = release
platform = espressif32
framework = arduino
board = esp32dev
board_build.partitions = esp32-cvbs-viewer.csv
upload_protocol = esptool
upload_speed = 921600
monitor_speed = 115200
lib_deps = 
	lovyan03/LovyanGFX@^1.1.16
	bitbank2/JPEGDEC@^1.8.4
lib_ldf_mode = deep+
build_src_filter = -<*> +<cvbs_viewer/*.cpp>
build_flags = 
	${env.build_flags}
	-D LOG_LEVEL=0
	-D DISABLE_LOGGING
	-D WM_NODEBUG
