[platformio]
default_envs = ai-thinker-cam-debug
boards_dir = ./boards
src_dir = src
lib_dir = lib

[env]
lib_deps = 
  tzapu/WiFiManager@^2.0.17
build_src_filter = +<*> -<viewer_*>
build_flags = 
	-D ARDUINO_ARCH_ESP32
	-D CAMERA_MULTICLIENT_TASK
	-I components/esp32-camera/sensors
	-I components/esp32-camera/sensors/private_include
	-I components/esp32-camera/conversions/include
	-I components/esp32-camera/conversions/private_include
	-I components/esp32-camera/driver/include
	-I components/esp32-camera/driver/private_include
	-I components/esp32-camera/target/jpeg_include
	-I components/esp32-camera/target/private_include
	-D VIEWER_WIFI_SSID='"Akwarium-2-4"'
	-D VIEWER_WIFI_PASS='"wifi2da2875277"'

[env:ai-thinker-cam]
build_type = release
platform = espressif32
framework = arduino, espidf
board = ai-thinker-cam
board_build.partitions = ai-thinker-cam.csv
upload_protocol = esptool
lib_deps =
	${env.lib_deps}
lib_ldf_mode = deep+
upload_speed = 921600
monitor_speed = 115200
	
build_flags =
	${env.build_flags}
	-D CAMERA_MODEL_AI_THINKER
	-D FRAME_SIZE=FRAMESIZE_HVGA
	-D XCLK_FREQ=20000000
	-D FPS=25
	-D WSINTERVAL=100
	-D MAX_CLIENTS=10
	-D JPEG_QUALITY=10
	-D LOG_LEVEL=0
	-D DISABLE_LOGGING
	-D WM_NODEBUG

[env:ai-thinker-cam-debug]
build_type = debug
platform = espressif32
framework = arduino, espidf
board = ai-thinker-cam
board_build.partitions = ai-thinker-cam.csv
board_build.partition_table_offset = 0x8000
upload_protocol = esptool
lib_deps = 
	${env.lib_deps}
lib_ldf_mode = deep+
upload_speed = 921600
monitor_speed = 115200
build_flags = 
	${env.build_flags}
	-D CAMERA_MODEL_AI_THINKER
	-D FRAME_SIZE=FRAMESIZE_HVGA
	-D XCLK_FREQ=20000000
	-D FPS=10
	-D WSINTERVAL=100
	-D MAX_CLIENTS=10
	-D JPEG_QUALITY=10
	-D LOG_LEVEL=6
	-D BENCHMARK
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1

[env:esp32s3-viewer]
build_type = release
platform = espressif32
framework = arduino
board = esp32s3-n16r8
board_build.partitions = esp32s3-viewer.csv
board_build.arduino.memory_type = qio_opi
upload_protocol = esptool
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
monitor_speed = 115200
lib_deps =
	lovyan03/LovyanGFX@^1.1.16
	bitbank2/JPEGDEC@^1.6.1
lib_ldf_mode = deep+
build_src_filter = +<viewer_main.cpp>
build_flags =
	-D ARDUINO_ARCH_ESP32
	-D BOARD_HAS_PSRAM
	-D ARDUINO_USB_MODE=1
	-D ARDUINO_USB_CDC_ON_BOOT=1
	-D VIEWER_STREAM_HOST='"192.168.50.86"'
	-D VIEWER_STREAM_PORT=80
	-D VIEWER_STREAM_PATH='"/mjpeg/1"'
	-D LOG_LEVEL=0
	-D DISABLE_LOGGING
	-D WM_NODEBUG

[env:esp32-cvbs-viewer]
build_type = debug
platform = espressif32
framework = arduino
board = esp32dev
board_build.partitions = esp32-cvbs-viewer.csv
upload_protocol = esptool
upload_speed = 921600
monitor_speed = 115200
lib_deps =
	lovyan03/LovyanGFX@^1.1.16
	bitbank2/JPEGDEC@^1.6.1
lib_ldf_mode = deep+
build_src_filter = +<viewer_cvbs.cpp>
build_flags =
	-D ARDUINO_ARCH_ESP32
	-D VIEWER_STREAM_HOST='"192.168.50.86"'
	-D VIEWER_STREAM_PORT=80
	-D VIEWER_STREAM_PATH='"/mjpeg/1"'
	-D LOG_LEVEL=6
	-D BENCHMARK
