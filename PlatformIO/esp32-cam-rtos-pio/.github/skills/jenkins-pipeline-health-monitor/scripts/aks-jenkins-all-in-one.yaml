# All-in-one deployment file for Jenkins Sanity Agent
---
apiVersion: v1
kind: Secret
metadata:
  name: jenkins-credentials
  namespace: monitoring
type: Opaque
data:
  # Base64 encoded values
  JENKINS_USERNAME: <base64 user>
  JENKINS_API_TOKEN: <base64 token>
  DB_FERNET_KEY: <base64 fernet>
---
apiVersion: v1
kind: Pod
metadata:
  name: jenkins-sanity-agent
  namespace: monitoring
  labels:
    app: jenkins-sanity-agent
    version: latest
spec:
  containers:
  - name: jenkins-sanity-agent
    image: ger-is-registry.caas.intel.com/fw-common/snic-images/jenkins_sanity_agent:latest
    ports:
    - containerPort: 8002
      name: metrics
      protocol: TCP
    env:
    - name: JENKINS_USERNAME
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: JENKINS_USERNAME
    - name: JENKINS_API_TOKEN
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: JENKINS_API_TOKEN
    - name: DB_FERNET_KEY
      valueFrom:
        secretKeyRef:
          name: jenkins-credentials
          key: DB_FERNET_KEY
    - name: JENKINS_PIPELINE_URL
      value: "https://cje-il-prod01.devtools.intel.com/epg-sie-ethfwjn/job/Maintenance/job/sanity_pipeline/"
    - name: PROMETHEUS_PORT
      value: "8002"
    - name: PYTHONUNBUFFERED
      value: "1"
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "256Mi"
        cpu: "200m"
    livenessProbe:
      httpGet:
        path: /metrics
        port: 8002
      initialDelaySeconds: 60
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 3
    readinessProbe:
      httpGet:
        path: /metrics
        port: 8002
      initialDelaySeconds: 30
      periodSeconds: 10
      timeoutSeconds: 5
      failureThreshold: 3
    volumeMounts:
    - name: logs
      mountPath: /app/logs
    imagePullPolicy: Always
  volumes:
  - name: logs
    emptyDir: {}
  restartPolicy: Always
---
apiVersion: v1
kind: Service
metadata:
  annotations:
    service.beta.kubernetes.io/azure-load-balancer-internal: "true"
  labels:
    app: jenkins-sanity-agent
  name: jenkins-sanity-agent-svc
  namespace: monitoring
spec:
  ports:
  - name: metrics
    port: 8002
    targetPort: 8002
  selector:
    app: jenkins-sanity-agent
  type: LoadBalancer